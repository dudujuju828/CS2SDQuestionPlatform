<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 681 90" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- School box -->
  <rect x="0" y="4" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="0" y1="32" x2="165" y2="32" stroke="#d1d5db" stroke-width="1"/>
  <text x="82" y="23" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">School</text>
  <text x="8" y="50" font-size="11" fill="#4b5563">- schoolID : longInt</text>
  <text x="8" y="67" font-size="11" fill="#4b5563">+ name : string</text>

  <!-- Relationship 1: School ◆—— Classroom (composition) -->
  <polygon points="165,45 172,39 179,45 172,51" fill="#374151"/>
  <line x1="179" y1="45" x2="258" y2="45" stroke="#374151" stroke-width="1.5"/>
  <text x="185" y="39" font-size="10" fill="#6b7280">1</text>
  <text x="247" y="39" font-size="10" fill="#6b7280">*</text>

  <!-- Classroom box -->
  <rect x="258" y="4" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="258" y1="32" x2="423" y2="32" stroke="#d1d5db" stroke-width="1"/>
  <text x="340" y="23" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">Classroom</text>
  <text x="266" y="50" font-size="11" fill="#4b5563">- roomNo : string</text>
  <text x="266" y="67" font-size="11" fill="#4b5563">+ capacity : int</text>

  <!-- Relationship 2: Classroom ◆—— Student (composition) -->
  <polygon points="423,45 430,39 437,45 430,51" fill="#374151"/>
  <line x1="437" y1="45" x2="516" y2="45" stroke="#374151" stroke-width="1.5"/>
  <text x="443" y="39" font-size="10" fill="#6b7280">1</text>
  <text x="505" y="39" font-size="10" fill="#6b7280">*</text>

  <!-- Student box -->
  <rect x="516" y="4" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="516" y1="32" x2="681" y2="32" stroke="#d1d5db" stroke-width="1"/>
  <text x="598" y="23" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">Student</text>
  <text x="524" y="50" font-size="11" fill="#4b5563">- studentID : longInt</text>
  <text x="524" y="67" font-size="11" fill="#4b5563">+ name : string</text>
</svg>
