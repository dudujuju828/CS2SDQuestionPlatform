<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 435 252" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Order box -->
  <rect x="0" y="0" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="0" y1="28" x2="165" y2="28" stroke="#d1d5db" stroke-width="1"/>
  <text x="82" y="19" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">Order</text>
  <text x="8" y="46" font-size="11" fill="#4b5563">- orderID : longInt</text>
  <text x="8" y="63" font-size="11" fill="#4b5563">+ orderDate : date</text>

  <!-- Relationship 1: Order ◆—— Customer (horizontal, composition) -->
  <polygon points="165,41 172,35 179,41 172,47" fill="#374151"/>
  <line x1="179" y1="41" x2="270" y2="41" stroke="#374151" stroke-width="1.5"/>
  <text x="185" y="35" font-size="10" fill="#6b7280">1</text>
  <text x="259" y="35" font-size="10" fill="#6b7280">1</text>

  <!-- Customer box -->
  <rect x="270" y="0" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="270" y1="28" x2="435" y2="28" stroke="#d1d5db" stroke-width="1"/>
  <text x="352" y="19" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">Customer</text>
  <text x="278" y="46" font-size="11" fill="#4b5563">- customerID : longInt</text>
  <text x="278" y="63" font-size="11" fill="#4b5563">+ name : string</text>

  <!-- Relationship 2: Order ◆—— LineItem (vertical, composition) -->
  <polygon points="82,82 88,89 82,96 76,89" fill="#374151"/>
  <line x1="82" y1="96" x2="82" y2="170" stroke="#374151" stroke-width="1.5"/>
  <text x="90" y="108" font-size="10" fill="#6b7280">1</text>
  <text x="90" y="165" font-size="10" fill="#6b7280">1..*</text>

  <!-- LineItem box -->
  <rect x="0" y="170" width="165" height="82" fill="white" stroke="#374151" stroke-width="1.5" rx="2"/>
  <line x1="0" y1="198" x2="165" y2="198" stroke="#d1d5db" stroke-width="1"/>
  <text x="82" y="189" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a2e">LineItem</text>
  <text x="8" y="216" font-size="11" fill="#4b5563">- lineItemID : longInt</text>
  <text x="8" y="233" font-size="11" fill="#4b5563">+ quantity : int</text>
</svg>
